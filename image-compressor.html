<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor | AdiyogiTools</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🖼️ Image Compressor</h1>

<p>Compress JPG, PNG and WebP images instantly.</p>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<label><b>Target Size</b></label>

<select id="targetSize">
    <option value="0">Use Quality Slider</option>
    <option value="20">20 KB</option>
    <option value="50">50 KB</option>
    <option value="100">100 KB</option>
    <option value="200">200 KB</option>
    <option value="500">500 KB</option>
</select>

<br><br>
  
<label>Compression Quality</label>

<br>

<input type="range"
id="quality"
min="10"
max="100"
value="80">

<p id="qualityValue">80%</p>

<button id="compressBtn">
📦 Compress Image
</button>

<br><br>

<img
id="preview"
style="max-width:100%;display:none;border-radius:10px;">

<br><br>

<p><b>Original Size:</b> <span id="originalSize">0 KB</span></p>

<p><b>Compressed Size:</b> <span id="compressedSize">0 KB</span></p>

<p><b>Saved:</b> <span id="savedPercent">0%</span></p>
  
<a
id="downloadBtn"
style="display:none;"
download="compressed-image.jpg">
📥 Download Compressed Image
</a>

</div>

<script src="image-compressor.js"></script>

</body>
</html>
