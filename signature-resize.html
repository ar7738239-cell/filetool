<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signature Resize</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>✍️ Signature Resize</h1>

<p>Select your signature image</p>

<input
type="file"
id="signature"
accept="image/*">

<br><br>

<label>Target Size (KB)</label>

<br><br>

<input
type="number"
id="targetKB"
placeholder="Example: 20">

<br><br>

<button onclick="resizeSignature()">

✍️ Resize Signature

</button>

<br><br>

<canvas
id="canvas"
style="display:none;">
</canvas>

<a
id="download"
download="signature.jpg"
style="display:none;">

📥 Download Signature

</a>

</div>

<script>
  function resizeSignature() {

const file = document.getElementById("signature").files[0];

if (!file) {
    alert("Please select a signature image.");
    return;
}

const targetKB = parseInt(document.getElementById("targetKB").value);

if (!targetKB || targetKB <= 0) {
    alert("Enter target size in KB.");
    return;
}

const reader = new FileReader();

reader.onload = function(e) {

    const img = new Image();

    img.onload = function() {

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.drawImage(img, 0, 0);

        let quality = 0.9;

        function compress() {

            const dataURL = canvas.toDataURL("image/jpeg", quality);

            const sizeKB = Math.round((dataURL.length * 3 / 4) / 1024);

            if (sizeKB > targetKB && quality > 0.05) {
                quality -= 0.05;
                compress();
            } else {

                const download = document.getElementById("download");

                download.href = dataURL;
                download.style.display = "inline-block";
                download.innerHTML = "📥 Download (" + sizeKB + " KB)";
            }

        }

        compress();

    };

    img.src = e.target.result;

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
